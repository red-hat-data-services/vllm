apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/vllm?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch == "rhoai-2.16" && !matches(source_branch, "^konflux/references") && !matches(source_branch, "^konflux/component-updates")
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: vllm
    appstudio.openshift.io/component: vllm-rocm-216
    pipelines.appstudio.openshift.io/type: build
  name: vllm-rocm-216-on-pull-request
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 9h
    tasks: 6h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rhoai-tenant/vllm-rocm-216:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: Dockerfile.rocm.ubi
  - name: path-context
    value: .
  - name: hermetic
    value: "false"
  - name: fetch-git-tags
    value: "true"
  - name: clone-depth
    value: "2147483647"
  - name: build-source-image
    value: "false"
  - name: build-image-index
    value: "false"
  - name: rebuild
    value: "true"
  - name: skip-checks
    value: "true"
  - name: build-platforms
    value:
    - linux-extra-fast/amd64
  - name: rhoai-version
    value: "2.16.4"
  taskRunSpecs:
  - pipelineTaskName: ecosystem-cert-preflight-checks
    computeResources:
      requests:
        cpu: '8'
        memory: 16Gi
      limits:
        cpu: '16'
        memory: 32Gi
  - pipelineTaskName: clair-scan
    computeResources:
      requests:
        cpu: '8'
        memory: 16Gi
      limits:
        cpu: '16'
        memory: 32Gi
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-vllm-rocm-216
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
